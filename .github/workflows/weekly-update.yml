name: Weekly Substack Update

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch new Substack posts
        run: npx tsx scripts/fetch-new-posts.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ga_context.txt && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit new posts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ga_context.txt
          git commit -m "Auto-update: fetch new Substack posts"
          git push

      # Pushing triggers Vercel's auto-deploy, so no extra step needed.
      # If you don't have Vercel git integration, uncomment below:
      # - name: Trigger Vercel deploy
      #   run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
